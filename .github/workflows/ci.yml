name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --include=src/app/core/services/chatBot/chat-bot.service.spec.ts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npx playwright test e2e/ui/route-guards.spec.ts e2e/ui/fast-booking.flow.spec.ts
