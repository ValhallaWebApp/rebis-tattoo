<h2 mat-dialog-title>Modifica progetto</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="dlg">
    <app-dynamic-form
      [fields]="formFields"
      [formGroupInput]="form"
      [showSubmit]="false"
      (focusout)="syncImageUrlsFromTextArea()"
    ></app-dynamic-form>

    <section class="media-box">
      <div class="media-box__head">
        <h3>Media progetto</h3>
        <label class="upload-btn">
          <input type="file" accept="image/jpeg,image/png,image/webp" (change)="onImageFileSelected($event)" />
          Carica immagine
        </label>
      </div>

      <mat-progress-bar
        *ngIf="uploadingImage"
        mode="determinate"
        [value]="imageUploadProgress">
      </mat-progress-bar>

      <div class="media-list" *ngIf="imageItems.length; else noMedia">
        <article class="media-item" *ngFor="let item of imageItems">
          <img [src]="item.url" alt="Anteprima progetto" loading="lazy" />
          <button mat-stroked-button type="button" color="warn" (click)="removeImage(item)">Rimuovi</button>
        </article>
      </div>

      <ng-template #noMedia>
        <p class="media-empty">Nessuna immagine caricata.</p>
      </ng-template>
    </section>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Annulla</button>
    <button mat-flat-button color="primary" type="submit">Salva</button>
  </mat-dialog-actions>
</form>
