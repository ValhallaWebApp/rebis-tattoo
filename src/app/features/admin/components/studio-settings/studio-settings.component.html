<section class="studio-settings">
  <mat-card class="panel">
    <div class="head">
      <h2>Impostazioni Studio (Public)</h2>
      <p>Tutto cio che modifichi qui viene mostrato nelle pagine pubbliche del sito.</p>
    </div>

    <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()" class="settings-form">
      <h3>Identita studio</h3>
      <app-dynamic-form
        class="full"
        [fields]="identityFields"
        [formGroupInput]="settingsForm"
        [showSubmit]="false"
      ></app-dynamic-form>

      <h3>Titolare</h3>
      <app-dynamic-form
        class="full"
        [fields]="ownerFields"
        [formGroupInput]="settingsForm"
        [showSubmit]="false"
      ></app-dynamic-form>

      <h3>Contatti pubblici</h3>
      <app-dynamic-form
        class="full"
        [fields]="contactsFields"
        [formGroupInput]="settingsForm"
        [showSubmit]="false"
      ></app-dynamic-form>

      <div class="actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="settingsForm.invalid || saving">
          <mat-icon>save</mat-icon>
          {{ saving ? 'Salvataggio...' : 'Salva impostazioni' }}
        </button>
      </div>
    </form>
  </mat-card>
</section>
