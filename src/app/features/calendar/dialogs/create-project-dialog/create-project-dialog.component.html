<h2 mat-dialog-title>Crea progetto</h2>

<form class="project-form" [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content>
    <app-dynamic-form
      [fields]="fields"
      [formGroupInput]="form"
      [showSubmit]="false"
    ></app-dynamic-form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Annulla</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Crea</button>
  </mat-dialog-actions>
</form>
