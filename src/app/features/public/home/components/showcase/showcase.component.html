<section class="showcase-container">
  <div class="showcase-content">
    <div class="showcase-text">
      <h2>{{ titleText() }}</h2>
      <h3 [innerHTML]="subtitleText()"></h3>
      <p>{{ descriptionText() }}</p>
      <a class="showcase-link" routerLink="/progetti">{{ ctaText() }}</a>
    </div>
    <div class="showcase-image">
      <img src="/home/home-1-5-549x422.jpg" [alt]="lang.t('home.showcase.imageAlt')" />
    </div>
  </div>
</section>
