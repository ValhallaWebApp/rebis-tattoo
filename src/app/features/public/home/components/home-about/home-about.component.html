<section class="about-section">
  <div class="about-wrapper">
    <div class="about-image">
      <img src="/personale/ink.webp" [alt]="lang.t('home.about.imageAlt')" />
    </div>
    <div class="about-text">
      <h2 class="title">
        {{ profile().homeAboutTitle || lang.t('home.about.title') }}
      </h2>
      <p>
        {{ profile().homeAboutParagraph1 || lang.t('home.about.paragraph1') }}
      </p>
      <!-- <p class="cta">
        {{ lang.t('home.about.paragraph2') }}
      </p> -->

      <div class="approach-box">

        <ul>
          <li *ngFor="let item of clientApproach()">
            <strong>{{ item.title }}</strong>
            <span>{{ item.text }}</span>
          </li>
        </ul>
      </div>

      <a routerLink="/chi-siamo" class="read-more">
        {{ profile().homeAboutCta || lang.t('home.about.cta') }}
        <span class="arrow">-></span>
      </a>
    </div>
  </div>
</section>
