<section class="calendar-shell" [ngClass]="theme">
  <!-- TOOLBAR -->
  <header class="calendar-toolbar">
    <div class="left">
      <button mat-icon-button (click)="prev()">
        <mat-icon>chevron_left</mat-icon>
      </button>

      <button mat-stroked-button (click)="today()">
        Oggi
      </button>

      <button mat-icon-button (click)="next()">
        <mat-icon>chevron_right</mat-icon>
      </button>

      <h2>{{ title$ | async }}</h2>
    </div>

    <div class="toolbar-right">
      <!-- TOGGLE BOOKING / SESSION -->
      <mat-button-toggle-group
        *ngIf="(bookingTypes?.length || 0) > 1"
        [value]="selectedType"
        (change)="onTypeChanged($event.value)"
      >
        <mat-button-toggle *ngFor="let t of (bookingTypes || [])" [value]="t">
          {{ t === 'booking' ? 'Consulenze' : 'Sedute' }}
        </mat-button-toggle>
      </mat-button-toggle-group>

      <!-- TOGGLE VIEW -->
      <mat-button-toggle-group
        class="view-toggle"
        [value]="(view$ | async) || 'week'"
        (change)="setView($event.value)"
      >
        <mat-button-toggle value="day">Giorno</mat-button-toggle>
        <mat-button-toggle value="week">Settimana</mat-button-toggle>
        <mat-button-toggle value="month">Mese</mat-button-toggle>
      </mat-button-toggle-group>

      <!-- TOGGLE TEMA -->
      <div class="theme-toggle">
        <button
          mat-icon-button
          (click)="setTheme('light')"
          [class.active]="theme === 'light'"
          matTooltip="Tema chiaro"
        >
          <mat-icon>light_mode</mat-icon>
        </button>

        <button
          mat-icon-button
          (click)="setTheme('dark')"
          [class.active]="theme === 'dark'"
          matTooltip="Tema scuro"
        >
          <mat-icon>dark_mode</mat-icon>
        </button>
      </div>
    </div>
  </header>

  <!-- CONTENUTO VIEW -->
  <div class="calendar-content" *ngIf="view$ | async as view">
    <app-day-view
      *ngIf="view === 'day'"
      [date]="date$ | async"
      [events]="events$ | async"
      [artistMap]="artistMap"
      [artistPhotoMap]="artistPhotoMap"
      [role]="role"
      (eventDropped)="handleEventDropped($event)"
      (createFromSlot)="openCreate($event)"
    ></app-day-view>

    <app-week-view
      *ngIf="view === 'week'"
      [date]="date$ | async"
      [events]="events$ | async"
      [artistMap]="artistMap"
      [artistPhotoMap]="artistPhotoMap"
      [role]="role"
      (eventDropped)="handleEventDropped($event)"
      (createFromSlot)="openCreate($event)"
    ></app-week-view>

    <app-month-view
      *ngIf="view === 'month'"
      [date]="date$ | async"
      [events]="events$ | async"
      [artistMap]="artistMap"
      [artistPhotoMap]="artistPhotoMap"
      [role]="role"
      (createFromDay)="openCreate($event)"
    ></app-month-view>
  </div>

  <!-- DRAWER -->
  <mat-drawer-container class="drawer-container" *ngIf="bookingForm">
    <mat-drawer
      position="end"
      mode="over"
      [(opened)]="drawerOpen"
      class="drawer-panel"
    >
      <h3>
        {{ selectedType === 'booking' ? 'Nuova consulenza' : 'Nuova seduta' }}
      </h3>

      <div class="drawer-form">
        <app-dynamic-form
          [fields]="drawerFields"
          [formGroupInput]="bookingForm"
          [showSubmit]="false"
        ></app-dynamic-form>
        <div class="drawer-actions">
          <button mat-stroked-button type="button" (click)="closeDrawer()">
            Annulla
          </button>
          <button mat-flat-button color="primary" type="button" (click)="onSubmitDrawer()">
            Salva
          </button>
        </div>
      </div>
    </mat-drawer>
  </mat-drawer-container>
</section>
